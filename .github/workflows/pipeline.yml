name: UrbIS Sync Pipeline
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tippecanoe osmium-tool libosmium2-dev libgdal-dev g++ python3-dev
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas pyogrio osmium
      - name: Run Fetch and Generate
        run: |
          python3 fetch-latest.py
      - name: Rename PMTiles
        run: |
          mv addresses.pmtiles addresses.pmtiles.gz
      - name: Check generated files
        run: ls -la *.pmtiles* || echo "Aucun fichier pmtiles trouvé"
      - name: Commit and Push PMTiles
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add addresses.pmtiles.gz version.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update addresses.pmtiles.gz - $(date +'%Y-%m-%d')"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
